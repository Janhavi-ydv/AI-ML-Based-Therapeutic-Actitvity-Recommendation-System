# ??? Server Configuration
server.port=8080
server.servlet.context-path=/

# ??? Application Info ?????????????????????????????????????????????????????????
spring.application.name=therapeutic-backend

# ??? MySQL Database ???????????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/neurapulse_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sa123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ??? JPA / Hibernate ??????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ??? JWT ??????????????????????????????????????????????????????????????????????
